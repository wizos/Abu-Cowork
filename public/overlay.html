<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .overlay {
    position: fixed;
    inset: 0;
    animation: breathe 3s ease-in-out infinite;
  }

  /* Four-edge blue border — thick and visible */
  .overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 6px solid rgba(56, 152, 255, 0.75);
    border-radius: 4px;
    box-shadow:
      inset 0 0 20px rgba(56, 152, 255, 0.3),
            0 0 20px rgba(56, 152, 255, 0.3);
    pointer-events: none;
  }

  /* Radial gradient vignette: transparent center → blue edges */
  .overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse at center,
      transparent 40%,
      rgba(56, 152, 255, 0.04) 55%,
      rgba(56, 152, 255, 0.10) 68%,
      rgba(56, 152, 255, 0.18) 80%,
      rgba(56, 152, 255, 0.28) 90%,
      rgba(56, 152, 255, 0.38) 100%
    );
    pointer-events: none;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1.0; }
  }

  /* Bottom status bar */
  .status-bar {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    padding: 6px 20px;
    background: rgba(10, 10, 20, 0.7);
    border: 1px solid rgba(56, 152, 255, 0.3);
    border-radius: 20px;
    color: rgba(180, 210, 255, 0.85);
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    white-space: nowrap;
    max-width: 80vw;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .status-bar.visible { opacity: 1; }
</style>
</head>
<body>
  <div class="overlay"></div>
  <div class="status-bar" id="statusBar"></div>

  <script>
    const statusBar = document.getElementById('statusBar');

    // Listen for status updates from main window via Tauri event
    if (window.__TAURI__) {
      window.__TAURI__.event.listen('computer-use-status', (event) => {
        const { step, action, stepLabel } = event.payload;
        if (action) {
          // stepLabel is pre-localized by the frontend (this HTML is a dumb view
          // outside the React i18n tree); fall back if an older emitter omits it.
          const label = stepLabel || `Step ${step}`;
          statusBar.textContent = `${label} · ${action}`;
          statusBar.classList.add('visible');
        } else {
          statusBar.classList.remove('visible');
        }
      });
    }
  </script>
</body>
</html>
