<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }
  .stop-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    background: rgba(20, 20, 30, 0.85);
    border: 1px solid rgba(255, 80, 80, 0.4);
    border-radius: 20px;
    color: rgba(255, 100, 100, 0.9);
    font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.15s ease;
  }
  .stop-btn:hover {
    background: rgba(255, 60, 60, 0.25);
    border-color: rgba(255, 80, 80, 0.6);
    color: #ff6b6b;
  }
  .stop-icon {
    width: 10px;
    height: 10px;
    background: currentColor;
    border-radius: 2px;
  }
  .shortcut {
    font-size: 11px;
    opacity: 0.5;
    margin-left: 4px;
  }
</style>
</head>
<body>
  <button class="stop-btn" id="stopBtn">
    <span class="stop-icon"></span>
    停止操控
    <span class="shortcut">⌘.</span>
  </button>
  <script>
    // Use Tauri global API (withGlobalTauri: true) to emit abort event
    document.getElementById('stopBtn').addEventListener('click', async () => {
      try {
        if (window.__TAURI__) {
          await window.__TAURI__.event.emit('computer-use-abort');
        }
      } catch (e) {
        console.error('Failed to emit abort:', e);
      }
    });
  </script>
</body>
</html>
