name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main, dev]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Fail fast if closed-source enterprise modules leaked into this public
      # repo (open-core boundary). Runs before npm so a build/test pass can't
      # mask it. See CLAUDE.md "Enterprise 代码隔离 — 防泄露红线（open-core）".
      - name: Enterprise leak guard (open-core)
        run: bash scripts/enterprise-leak-guard.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      # Gate steps run independently of EACH OTHER (so one red stage doesn't mask
      # another) but are skipped when install failed or the job was cancelled —
      # otherwise they'd fire against an empty node_modules and bury the real
      # cause under cascading "command not found" noise.
      - name: Lint
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm run lint

      - name: Type check
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm run typecheck

      # gen:models:check is intentionally omitted as a standalone step:
      # it runs automatically via the `pretest` npm hook before test:coverage,
      # and again inside `npm run build`. Keeping it separate would be redundant
      # and add unnecessary latency.

      - name: Test with coverage
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Verify Chrome extension bundle is in sync with source
        shell: bash
        run: |
          # Rebuild the extension from source in a clean env, then compare the
          # output against the committed src-tauri/browser-extension/ bundle.
          # Any drift means someone changed abu-chrome-extension/src/ (or
          # abu-browser-shared/types.ts) without rebuilding + syncing the
          # committed artifact — so the released app would ship a stale extension.
          (cd abu-chrome-extension && npm ci && npm run build)

          # .map files excluded: non-behavioral, sourcemap paths can have minor
          # environmental variance. .js/.html/manifest.json are what users run.
          if ! diff -r --exclude='*.map' \
              abu-chrome-extension/dist \
              src-tauri/browser-extension > /tmp/ext-diff.txt 2>&1; then
            echo "::error::Chrome extension bundle is out of sync with source."
            echo ""
            echo "--- Differences ---"
            cat /tmp/ext-diff.txt
            echo ""
            echo "--- Fix ---"
            echo "cd abu-chrome-extension && npm run build"
            echo "cd .. && npm run copy-resources"
            echo "git add src-tauri/browser-extension/ && commit"
            exit 1
          fi
          echo "OK: Chrome extension bundle matches source"
