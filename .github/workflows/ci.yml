name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ --max-warnings 0

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm test

      - name: Test Coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Build frontend
        run: npm run build

      - name: Verify Chrome extension bundle is in sync with source
        shell: bash
        run: |
          # Rebuild the extension from source in a clean env, then compare the
          # output against the committed src-tauri/browser-extension/ bundle.
          # Any drift means someone changed abu-chrome-extension/src/ (or
          # abu-browser-shared/types.ts) without rebuilding + syncing the
          # committed artifact — so the released app would ship a stale extension.
          (cd abu-chrome-extension && npm ci && npm run build)

          # .map files excluded: non-behavioral, sourcemap paths can have minor
          # environmental variance. .js/.html/manifest.json are what users run.
          if ! diff -r --exclude='*.map' \
              abu-chrome-extension/dist \
              src-tauri/browser-extension > /tmp/ext-diff.txt 2>&1; then
            echo "::error::Chrome extension bundle is out of sync with source."
            echo ""
            echo "--- Differences ---"
            cat /tmp/ext-diff.txt
            echo ""
            echo "--- Fix ---"
            echo "cd abu-chrome-extension && npm run build"
            echo "cd .. && npm run copy-resources"
            echo "git add src-tauri/browser-extension/ && commit"
            exit 1
          fi
          echo "OK: Chrome extension bundle matches source"
