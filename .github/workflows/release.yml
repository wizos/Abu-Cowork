name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Setup embedded Python runtime
        run: bash scripts/setup-python-runtime.sh
        shell: bash

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          # Write signing key to file — avoids Windows env var corruption
          # (Windows appends stray chars to multi-line secrets, causing base64 decode errors)
          echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > "$RUNNER_TEMP/tauri-signing-key.txt"
          export TAURI_SIGNING_PRIVATE_KEY_PATH="$RUNNER_TEMP/tauri-signing-key.txt"
          npx tauri build --target ${{ matrix.target }}
          rm -f "$RUNNER_TEMP/tauri-signing-key.txt"

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Abu ${{ github.ref_name }}" \
            --notes "See the assets below for download links." \
            || true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          BUNDLE="src-tauri/target/${TARGET}/release/bundle"

          echo "=== Bundle contents ==="
          ls -la "$BUNDLE"/macos/ 2>/dev/null || true
          ls -la "$BUNDLE"/dmg/ 2>/dev/null || true
          ls -la "$BUNDLE"/nsis/ 2>/dev/null || true

          if [[ "$TARGET" == *"apple"* ]]; then
            # macOS .app.tar.gz has the same filename across architectures —
            # rename to include arch suffix to avoid Release upload collision.
            if [[ "$TARGET" == *"aarch64"* ]]; then
              ARCH_SUFFIX="aarch64"
            else
              ARCH_SUFFIX="x64"
            fi
            cp "$BUNDLE"/macos/Abu.app.tar.gz "$BUNDLE"/macos/Abu_${ARCH_SUFFIX}.app.tar.gz
            cp "$BUNDLE"/macos/Abu.app.tar.gz.sig "$BUNDLE"/macos/Abu_${ARCH_SUFFIX}.app.tar.gz.sig

            gh release upload "$TAG" "$BUNDLE"/dmg/*.dmg --clobber || true
            gh release upload "$TAG" "$BUNDLE"/macos/Abu_${ARCH_SUFFIX}.app.tar.gz --clobber
            gh release upload "$TAG" "$BUNDLE"/macos/Abu_${ARCH_SUFFIX}.app.tar.gz.sig --clobber
          else
            gh release upload "$TAG" "$BUNDLE"/nsis/*-setup.exe --clobber || true
            gh release upload "$TAG" "$BUNDLE"/nsis/*-setup.nsis.zip --clobber
            gh release upload "$TAG" "$BUNDLE"/nsis/*-setup.nsis.zip.sig --clobber
          fi

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download updater assets from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets

          echo "=== All release assets ==="
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name'

          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            -D release-assets \
            -p "*.tar.gz" -p "*.tar.gz.sig" -p "*.nsis.zip" -p "*.nsis.zip.sig"

          echo "=== Downloaded ==="
          ls -la release-assets/

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OSS_BASE="https://${{ secrets.OSS_BUCKET }}.${{ secrets.OSS_REGION }}.aliyuncs.com/releases/${VERSION}"

          AARCH64_SIG=$(cat release-assets/*aarch64*.tar.gz.sig 2>/dev/null || echo "")
          X86_64_SIG=$(cat release-assets/*x64*.tar.gz.sig 2>/dev/null || echo "")
          WINDOWS_SIG=$(cat release-assets/*.nsis.zip.sig 2>/dev/null || echo "")

          AARCH64_FILE=$(ls release-assets/*aarch64*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          X86_64_FILE=$(ls release-assets/*x64*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          WINDOWS_FILE=$(ls release-assets/*.nsis.zip 2>/dev/null | grep -v '.sig' | head -1 | xargs basename 2>/dev/null || echo "")

          python3 -c "
          import json
          platforms = {}
          pairs = [
              ('darwin-aarch64', '$AARCH64_FILE', '''$AARCH64_SIG'''),
              ('darwin-x86_64', '$X86_64_FILE', '''$X86_64_SIG'''),
              ('windows-x86_64', '$WINDOWS_FILE', '''$WINDOWS_SIG'''),
          ]
          for key, fname, sig in pairs:
              if fname and sig.strip():
                  platforms[key] = {'signature': sig.strip(), 'url': '$OSS_BASE/' + fname}
          data = {
              'version': '$VERSION',
              'notes': 'See https://github.com/${{ github.repository }}/releases/tag/$VERSION',
              'pub_date': '$DATE',
              'platforms': platforms
          }
          json.dump(data, open('latest.json', 'w'), indent=2)
          print(json.dumps(data, indent=2))
          "

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Configure ossutil
        run: |
          ossutil config \
            -e ${{ secrets.OSS_REGION }}.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Upload to OSS
        run: |
          VERSION="${{ github.ref_name }}"
          BUCKET="oss://${{ secrets.OSS_BUCKET }}"

          for file in release-assets/*; do
            [ -f "$file" ] || continue
            ossutil cp "$file" "${BUCKET}/releases/${VERSION}/$(basename $file)" -f
          done

          ossutil cp latest.json "${BUCKET}/latest.json" -f --meta "Cache-Control:no-cache"

          echo "Done. Listing:"
          ossutil ls "${BUCKET}/releases/${VERSION}/"
