name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Setup embedded Python runtime
        run: bash scripts/setup-python-runtime.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Abu ${{ github.ref_name }}'
          releaseBody: |
            See the assets below for download links.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      - name: Upload updater assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          TAG="${{ github.ref_name }}"

          if [[ "$TARGET" == *"apple"* ]]; then
            BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle/macos"
          else
            BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle/nsis"
          fi

          echo "=== Debug: pwd=$(pwd) ==="
          echo "=== Bundle dir: $BUNDLE_DIR ==="
          ls -la "$BUNDLE_DIR"/ 2>&1 || echo "Directory not found, listing parent:"
          ls -la "src-tauri/target/${TARGET}/release/bundle/" 2>&1 || echo "Bundle parent not found either"

          for f in "$BUNDLE_DIR"/*.tar.gz "$BUNDLE_DIR"/*.tar.gz.sig "$BUNDLE_DIR"/*.nsis.zip "$BUNDLE_DIR"/*.nsis.zip.sig; do
            if [ -f "$f" ]; then
              echo "Uploading: $(basename $f)"
              gh release upload "$TAG" "$f" --clobber
            fi
          done

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download updater assets from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets

          echo "=== All release assets ==="
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name'

          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            -D release-assets \
            -p "*.tar.gz" -p "*.tar.gz.sig" -p "*.nsis.zip" -p "*.nsis.zip.sig" \
            || echo "Warning: some patterns had no matches"

          echo "=== Downloaded ==="
          ls -la release-assets/ || echo "No files downloaded"

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OSS_BASE="https://${{ secrets.OSS_BUCKET }}.${{ secrets.OSS_REGION }}.aliyuncs.com/releases/${VERSION}"

          AARCH64_SIG=$(cat release-assets/*aarch64*.tar.gz.sig 2>/dev/null || echo "")
          X86_64_SIG=$(cat release-assets/*x64*.tar.gz.sig 2>/dev/null || echo "")
          WINDOWS_SIG=$(cat release-assets/*.nsis.zip.sig 2>/dev/null || echo "")

          AARCH64_FILE=$(ls release-assets/*aarch64*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          X86_64_FILE=$(ls release-assets/*x64*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          WINDOWS_FILE=$(ls release-assets/*.nsis.zip 2>/dev/null | grep -v '.sig' | head -1 | xargs basename 2>/dev/null || echo "")

          python3 -c "
          import json
          platforms = {}
          pairs = [
              ('darwin-aarch64', '$AARCH64_FILE', '''$AARCH64_SIG'''),
              ('darwin-x86_64', '$X86_64_FILE', '''$X86_64_SIG'''),
              ('windows-x86_64', '$WINDOWS_FILE', '''$WINDOWS_SIG'''),
          ]
          for key, fname, sig in pairs:
              if fname and sig.strip():
                  platforms[key] = {'signature': sig.strip(), 'url': '$OSS_BASE/' + fname}
          data = {
              'version': '$VERSION',
              'notes': 'See https://github.com/${{ github.repository }}/releases/tag/$VERSION',
              'pub_date': '$DATE',
              'platforms': platforms
          }
          json.dump(data, open('latest.json', 'w'), indent=2)
          print(json.dumps(data, indent=2))
          "

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Configure ossutil
        run: |
          ossutil config \
            -e ${{ secrets.OSS_REGION }}.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Upload to OSS
        run: |
          VERSION="${{ github.ref_name }}"
          BUCKET="oss://${{ secrets.OSS_BUCKET }}"

          for file in release-assets/*; do
            [ -f "$file" ] || continue
            ossutil cp "$file" "${BUCKET}/releases/${VERSION}/$(basename $file)" -f
          done

          ossutil cp latest.json "${BUCKET}/latest.json" -f --meta "Cache-Control:no-cache"

          echo "Done. Listing:"
          ossutil ls "${BUCKET}/releases/${VERSION}/"
